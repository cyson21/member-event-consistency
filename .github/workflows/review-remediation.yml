name: Review Remediation

on:
  pull_request:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  testcontainers-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Confirm Docker runtime
        run: docker info

      - name: Run Docker-backed integration tests
        run: mvn -f backend/pom.xml -Dtest='*IT' test

  standard-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci --prefix web

      - name: Run Maven regression
        run: mvn -f backend/pom.xml test

      - name: Run dashboard typecheck
        run: npm --prefix web test

      - name: Run dependency-free regression
        run: node tools/runner/check-dependency-free-regression.mjs
